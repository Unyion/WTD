name: Build and Release
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: macos
            build_args: --mac
          - os: windows-latest
            platform: windows
            build_args: --win
          - os: ubuntu-latest
            platform: linux
            build_args: --linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Sync app version to tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith('v')) {
            $version = $version.Substring(1)
          }

          npm version $version --no-git-tag-version --allow-same-version

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run dist -- ${{ matrix.build_args }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dist-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate release summary
        shell: bash
        run: |
          current_tag="${GITHUB_REF_NAME}"
          previous_tag="$(git tag --sort=-version:refname | grep -Fxv "$current_tag" | head -n 1 || true)"

          if [ -n "$previous_tag" ]; then
            range="$previous_tag..$current_tag"
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${current_tag}"
            changes_intro="Changes since ${previous_tag}."
          else
            range="$current_tag"
            compare_url=""
            changes_intro="Initial GitHub release for this repository."
          fi

          {
            echo "## ${current_tag} - Release Summary"
            echo
            echo "### What's New"
            echo "- ${changes_intro}"
            echo "- This release includes the changes listed below and updated installers for supported platforms."
            echo
            echo "### Changes"
            git log --pretty=format:'- %s (%h)' "$range" || true
            echo
            if [ -n "$compare_url" ]; then
              echo
              echo "### Full Changelog"
              echo "- ${compare_url}"
            fi
            echo
            echo "### Downloads"
            echo "- Installers for Windows (.exe), macOS (.dmg), and Linux (.AppImage, .deb, .rpm) are attached below."
            echo
            echo "### System Requirements"
            echo "- Windows 10+"
            echo "- macOS 10.13+"
            echo "- Modern 64-bit Linux distribution"
            echo
            echo "### Known Issues"
            echo "- macOS builds may require manual trust on first launch because the app is not notarized."
          } > release-notes.md

      - name: Create release and upload installers
        uses: softprops/action-gh-release@v2
        with:
          name: What To Do ${{ github.ref_name }}
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.exe
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.rpm
