stages:
  - build
  - release

variables:
  NODE_VERSION: "18"

# Build for macOS
build_macos:
  stage: build
  tags:
    - saas-macos-medium-m1  # GitLab Ultimate macOS runner
  image: macos-14-xcode-15  # Updated to use allowed image
  script:
    - echo "Building for macOS..."
    - node --version
    - npm --version
    - npm ci
    - npm run dist -- --mac
    - echo "macOS build complete!"
    - ls -la dist/
  artifacts:
    paths:
      - dist/*.dmg
      - dist/mac/
    expire_in: 1 day
  only:
    - tags

# Build for Windows  
build_windows:
  stage: build
  tags:
    - saas-windows-medium-amd64  # GitLab Ultimate Windows runner
  image: 
    name: mcr.microsoft.com/windows/servercore:ltsc2022
    entrypoint: [""]
  before_script:
    - choco install git -y
    - refreshenv
  script:
    - echo "Building for Windows..."
    - node --version
    - npm --version
    - npm ci
    - npm run dist -- --win
    - echo "Windows build complete!"
    - dir dist
  artifacts:
    paths:
      - dist/*.exe
      - dist/win-unpacked/
    expire_in: 1 day
  only:
    - tags

# Build for Linux
build_linux:
  stage: build
  image: node:$NODE_VERSION
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl libxtst6 libxrandr2 libasound2 libpangocairo-1.0-0 libatk1.0-0 libcairo-gobject2 libgtk-3-0 libgdk-pixbuf2.0-0 libnss3 libxss1 libdrm2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libxkbcommon0 libatspi2.0-0
  script:
    - echo "Building for Linux..."
    - npm ci
    - npm run dist -- --linux
    - echo "Linux build complete!"
    - ls -la dist/
  artifacts:
    paths:
      - dist/*.AppImage
      - dist/*.deb
      - dist/*.rpm
      - dist/linux-unpacked/
    expire_in: 1 day
  only:
    - tags

# Release stage - creates GitLab release with download links
create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build_macos
    - build_windows  
    - build_linux
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG..."
    - echo "Collecting artifacts from all platforms..."
    - find . -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm"
  release:
    name: 'What To Do $CI_COMMIT_TAG'
    description: |
      ## What To Do $CI_COMMIT_TAG
      
      Your personal activity suggestion app based on weather and preferences!
      
      ### Platform Downloads:
      
      **🍎 macOS** 
      - Download the `.dmg` file from the artifacts below
      - Open the DMG and drag to Applications folder
      
      **🪟 Windows**
      - Download the `.exe` installer from the artifacts below  
      - Run the installer and follow the prompts
      
      **🐧 Linux**
      - **AppImage**: Download `.AppImage`, make executable, and run
      - **Package Managers**: Download `.deb` (Ubuntu/Debian) or `.rpm` (Fedora/CentOS)
      
      ### What's New:
      - ✨ Initial release with weather-based activity suggestions
      - 🌍 Location auto-detection with smart fallback search
      - 🌦️ Activity filtering by weather, season, and time constraints
      - 🌅 Smart daylight detection with 30-minute sunset buffer
      - ⚡ Rate-limited weather updates to prevent API spam
      - 🎨 Dark/Light theme support with system detection
      - 📱 Random suggestion headers for engaging user experience
      
      ### Installation:
      All platforms include the same features and functionality. Choose the format that works best for your system!
    tag_name: $CI_COMMIT_TAG
    assets:
      links:
        - name: '🍎 macOS Downloads (.dmg)'
          url: '$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/browse/dist/?job=build_macos'
          link_type: 'package'
        - name: '🪟 Windows Downloads (.exe)'
          url: '$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/browse/dist/?job=build_windows'
          link_type: 'package'
        - name: '🐧 Linux Downloads (.AppImage, .deb, .rpm)'
          url: '$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/browse/dist/?job=build_linux'
          link_type: 'package'
        - name: '📦 All Platforms (Combined Download)'
          url: '$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/download?job=build_macos,build_windows,build_linux'
          link_type: 'other'
  only:
    - tags