stages:
  - build
  - release

variables:
  NODE_VERSION: "18"
  
# Build stage - creates the installers for all platforms
build_app:
  stage: build
  image: node:$NODE_VERSION
  before_script:
    # Install system dependencies for Electron builds (including Linux support)
    - apt-get update -qq && apt-get install -y -qq git curl libxtst6 libxrandr2 libasound2 libpangocairo-1.0-0 libatk1.0-0 libcairo-gobject2 libgtk-3-0 libgdk-pixbuf2.0-0 libnss3 libxss1 libdrm2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libxkbcommon0 libatspi2.0-0
  script:
    - echo "Installing dependencies..."
    - npm ci
    - echo "Building Electron app for all platforms..."
    - npm run dist
    - echo "Build complete! Checking output..."
    - ls -la dist/
    - echo "Looking for specific file types..."
    - find dist/ -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm"
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  only:
    - tags  # Only runs when you create a tag like v1.0.0

# Release stage - creates GitLab release with download links
create_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build_app
  script:
    - echo "Creating GitLab release for $CI_COMMIT_TAG..."
    - echo "Available files:"
    - find dist/ -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" | head -10
    - echo "Generating specific download URLs..."
  release:
    name: 'What To Do v$CI_COMMIT_TAG'
    description: |
      ## What To Do v$CI_COMMIT_TAG
      
      Your personal activity suggestion app based on weather and preferences!
      
      ### Downloads:
      - **macOS**: Download the .dmg file below
      - **Windows**: Download the .exe file below  
      - **Linux**: Download the .AppImage file below (portable) or .deb/.rpm for package managers
      
      ### Installation:
      
      **macOS**: Open the .dmg file and drag the app to Applications
      **Windows**: Run the .exe installer  
      **Linux**: Make the .AppImage executable (`chmod +x`) and run it, or install the .deb/.rpm package
      
      ### Changes in this version:
      - Initial release with weather-based activity suggestions
      - Location auto-detection and manual entry with autocomplete
      - Activity filtering by weather, season, and time
      - Smart daylight hour detection with 30-minute sunset buffer
      - Rate-limited weather updates
      - Dark/Light theme support
    tag_name: $CI_COMMIT_TAG
    assets:
      links:
        - name: 'Browse All Downloads'
          url: '$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/browse/dist/?job=build_app'
          link_type: 'other'
        - name: 'Download Artifacts (All Platforms)'
          url: '$CI_PROJECT_URL/-/jobs/artifacts/$CI_COMMIT_TAG/download?job=build_app'
          link_type: 'package'
  only:
    - tags